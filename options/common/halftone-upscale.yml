applyIn:
    -   value: without
        weight: 20.0
    -   value: both
        weight: 1.0

both:
    pattern: dots # dots and lines
    size: [2.5, 9.99]
    mode: intensity
    shapes:
        -   value: dot
            weight: 10.0 
        -   value: [elipse, diamond, square]
            weight: 5.0
    interpolation:
        -   value: lineal
            weight: 5.0 
        -   value: sinusoidal
            weight: 2.0

colored: # colored and colorTone, copy from parent the options missing here, TODO: Checi if this is working
    applyIn:
        -   value: without
            weight: 20.0
        -   value: both
            weight: 1.0

    both:
        pattern: dots # dots and lines
        size: [2.5, 9.99]
        mode: 'independent_channels'