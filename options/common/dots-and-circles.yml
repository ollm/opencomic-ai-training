-   type: dots # Add dots like ... to avoid descreen them
    prob: 0.1
    amount: [5, 15]
    size: 
        min: [1.1, 3.1]
        max: [3.1, 6.1]
    dots: # number of secuential dots to place the drawing
        min: [1, 3]
        max: [3, 10]
    verticalAndHorizontalChance: 0.5 # Probability of placing dots in vertical or horizontal lines
