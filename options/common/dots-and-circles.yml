-   type: dots # Add dots like ... to avoid descreen them
    prob: 0.1
    segments: # Number of segments to draw the dots, higher segments means more cicular dots, lower segments means cubic dots
        min: 1
        max: 32
    brush: 
        name: 'b) Basic-1'
        color:
            -   value:
                    gray: 0
                weight: 10.0
            -   value: 
                    gray: [200, 254]
                weight: 2.0
            -   value: 
                    gray: [100, 200]
                weight: 2.0
        size: 2
    amount: [5, 15]
    flatten:
        _prob: 0.1 # Chance to flatten the circle
        ratio: # If flatten is applied, the ratio between x and y axis, lower means horizontally flattened, higher means vertically flattened, 1 means no flatten
            min: 0.25
            max: 1
    size: 
        min: [1.1, 3.1]
        max: [3.1, 6.1]
    dots: # number of secuential dots to place the drawing
        min: [1, 3]
        max: [3, 10]
    verticalAndHorizontalChance: 0.5 # Probability of placing dots in vertical or horizontal lines, the rest will be placed in random lines
    # colors: # TODO: Not working currently, only in base color
    #    file: options/common/colors.yml

-   type: dots # Add random dots to avoid descreen them
    prob: 0.05
    segments: # Number of segments to draw the dots, higher segments means more cicular dots, lower segments means cubic dots
        min: 1
        max: 32
    brush: 
        name: 'b) Basic-1'
        color:
            -   value:
                    gray: 0
                weight: 10.0
            -   value: 
                    gray: [200, 254]
                weight: 2.0
            -   value: 
                    gray: [100, 200]
                weight: 2.0
        size: 2
    amount: [5, 15]
    spread: [30.1, 120.1]
    flatten:
        _prob: 0.1 # Chance to flatten the circle
        ratio: # If flatten is applied, the ratio between x and y axis, lower means horizontally flattened, higher means vertically flattened, 1 means no flatten
            min: 0.25
            max: 1
    size: 
        min: [1.1, 3.1]
        max: [6.1, 12.1]
    dots: # number of secuential dots to place the drawing
        min: [1, 2]
        max: [2, 5]
    # colors: # TODO: Not working currently, only in base color
    #    file: options/common/colors.yml

-   type: circles # Add circles to avoid descreen them
    prob: 0.05
    segments: # Number of segments to draw the dots, higher segments means more cicular dots, lower segments means cubic dots
        min: 1
        max: 32
    brush: 
        name: 'b) Basic-1'
        color:
            -   value:
                    gray: 0
                weight: 10.0
            -   value: 
                    gray: [200, 254]
                weight: 2.0
        size: 
            -   value:
                    min: 0.1
                    max: 0.9
                weight: 1.0
            -   value:
                    min: 0.1
                    max: 1.9
                weight: 1.0
    amount: 
        -   value: [5, 15]
            weight: 2.0
        -   value: [50, 150]
            weight: 1.0
    spread: [30.1, 120.1]
    flatten:
        _prob: 0.5 # Chance to flatten the circle
        ratio: # If flatten is applied, the ratio between x and y axis, lower means horizontally flattened, higher means vertically flattened, 1 means no flatten
            min: 0.25
            max: 1
    size: 
        -   value:
                min: [5.1, 15.1]
                max: [30.1, 60.1]
            weight: 1.0
        -   value:
                min: [20.1, 60.1]
                max: [120.1, 240.1]
    # colors: # TODO: Not working currently, only in base color
    #    file: options/common/colors.yml

