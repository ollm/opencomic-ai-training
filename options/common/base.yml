disableBrushesWithPixelatedEdges: true # Disable brushes that produce pixelated edges, useful upscaling datasets or avoid pixelated restoration
background:
    -   value:
            gray: 255
        weight: 10.0
    -   value: 
            gray: [200, 254]
        weight: 5.0
    -   value: 
            gray: [1, 55]
        weight: 2.5
    -   value: 
            gray: 0
        weight: 5.0

halftone:
    angle:
        -   value: 45
            weight: 5.0 
        -   value: [42.1, 47.9] # range, decimal value for decimal range
            weight: 1.0
        -   value: 0
            weight: 1.0
size:
    width: [500, 2000]
    height: [500, 2000]
    _multiple: 4

lineart:
    invertBackground:
        prob: 0.5
    brush: 
        name: '' # Use group if name is empty (Random brush from group)
        category: [pencil, ink, charcoal, sketching]
        size: [3, 20]
    cubicPercentage: [0.6, 1.0]
    sublines: # TODO: Not implemented yet
        active:
            prob: 0.4
        min: [1, 3]
        max: [4, 6]
        offset: [1, 10] # Max offset distance between sublines (size of the brush will be added), Randomized
    colors: # TODO: Not implemented yet
        gray:
            -   value: 
                    min: 255
                    max: 255
                weight: 10.0
            -   value: 
                    min: 150
                    max: 255
                weight: 2.0
            -   value: 
                    min: 0
                    max: 255
                weight: 1.0
        alpha: # Consider disabling if pressure is implemented (pressureOne, pressureTwo)
            -   value: 
                    min: 255
                    max: 255
                weight: 5.0
            -   value: 
                    min: 100
                    max: 255
                weight: 1.0
        colored:
            active:
                prob: 0.1
            colors: [1, 3] # Amount of different colors used in lineart
            paletteColors: [3, 20] # A new palette will be created with this amount of colors.
            similarColors:  [0, 3] # Agrupate colors in a range of similar colors, 0 disables similar colors
            differentColors: # Use direfent colors inside same paint (By default similar colors are used inside same paint)
                prob: 0.2
            palette:
                name: ['rand', 'Animation Color Set', 'Concept-cookie', 'Default', 'Swatches', 'PixelArt 32', 'Gradient', 'Markers']

lineart-texture:
    invertBackground:
        prob: 0.5
    cubicPercentage: [0.6, 1.0]
    sublines: # TODO: Not implemented yet
        active:
            prob: 0.4

lineart-random:
    invertBackground:
        prob: 0.5
    cubicPercentage: [0.6, 1.0]
    sublines: # TODO: Not implemented yet
        active:
            prob: 0.4

# TODO: Not implemented yet
shading:
    type: 
        -   value: hard
            weight: 1.0
        -   value: smoth
            weight: 1.0
        -   value: mix
            weight: 1.0
    hard:
        lineart:
            prob: 0.3
    smoth:
        size: [5, 50]
    mix:
        distribution: [0.3, 0.7] # Range of proportion of hard and smoth shading, the value below means hard and the value above means smoth (Example if distribution is 0.4, then 40% hard and 60% smoth)

# This is also used in black-white (gray) images
colors:
    gray:
        -   value: 
                min: 150
                max: 255
            weight: 3.0
        -   value: 
                min: 0
                max: 255
            weight: 1.0
    alpha:
        -   value: 
                min: 255
                max: 255
            weight: 5.0
        -   value: 
                min: 100
                max: 255
            weight: 1.0
    colorTone: # Only if colored is not active
        active:
            prob: 0.2
        offset:
            r: [-20, 20]
            g: [-20, 20]
            b: [-20, 20]
    colored:
        active:
            prob: 0.2
        paletteColors: [3, 20] # A new palette will be created with this amount of colors.
        similarColors:  # Agrupate colors in a range of similar colors, 0 disables similar colors
            -   value: [0, 3]
                weight: 1.0
            -   value: [5, 9]
                weight: 1.0
        differentColors: # Use direfent colors inside same paint (By default similar colors are used inside same paint)
            prob: 0.5
        palette:
            name: ['rand', 'Animation Color Set', 'Concept-cookie', 'Default', 'Swatches', 'PixelArt 32', 'Gradient', 'Markers']