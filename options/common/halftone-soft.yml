applyIn:
    -   value: without
        weight: 1.0
    -   value: degraded
        weight: 3.0
    -   value: both
        weight: 1.0
both:
    pattern: dots
    size: [6.40, 15.99]
    mode: intensity
    shapes:
        -   value: dot
            weight: 10.0 
        -   value: [elipse, diamond, square]
            weight: 2.0
    interpolation:
        -   value: lineal
            weight: 5.0 
        -   value: sinusoidal
            weight: 1.0
degraded:
    pattern: dots # dots and lines
    size: [2.5, 4.3]
    mode: intensity
    shapes:
        -   value: dot
            weight: 10.0 
        -   value: [elipse, diamond, square]
            weight: 1.0
    interpolation: [lineal, sinusoidal]
colored: # colored and colorTone, copy from parent the options missing here, TODO: Check if this is working
    applyIn:
        -   value: without
            weight: 3.0
        -   value: degraded
            weight: 3.0
    degraded:
        pattern: dots # dots and lines
        size: [2.4, 9.99]
        mode: independent_channels