seed: 1 # for reproducibility, Keep in mind that the patterns of the Krita brushes may change over different sessions.
resume: true
images: 5000 # number of clean images to generate, the total number of final images will be images * degradedImagesPerCleanImage
degradedImagesPerCleanImage: 10
format: jpg # final format of the clean and degraded images (png or jpg)

# Base options, this will be base of the image
base:
    disableBrushesWithPixelatedEdges: true # Disable brushes that produce pixelated edges, useful upscaling datasets or avoid pixelated restoration
    file: options/common/base.yml
    halftone:
        angle:
            -   value: 45
                weight: 5.0 
            -   value: [42.1, 47.9] # range, decimal value for decimal range
                weight: 1.0
            -   value: 0
                weight: 1.0

drawings:
    file: 'options/common/drawings.yml'

degradations:

    -   name: opencomic-ai-descreen-hard
        output:
            clean: datasets/opencomic-ai-descreen-hard/clean
            degraded: datasets/opencomic-ai-descreen-hard/degraded
            options:  datasets/opencomic-ai-descreen-hard/options
        inKrita:

            -   type: halftone
                prob: 1.0
                singleRun: false # Apply halftone only once for all degradations, reduce Krita processing time
                sameInAllLayers: false # Use the same halftone settings for all layers (all, up, middle, down), required if inKrita.halftone.config.size is used
                file: options/common/halftone-hard.yml

        inNodePromiseAll: false # Run all inNode steps in parallel (faster but currently not compatible with "if" conditions if singleRun is disabled)
        inNode:

            -   type: rotate # rotation are applied in clean and degraded images
                prob: 0.05
                skipIf: [null, rotate]
                angle: [-45, 45]
                background: '#ffffff'

            -   type: resize
                prob: 0.8
                both: true
                scale:
                    -   value: [0.20, 0.999]
                        weight: 4.0 
                    -   value: [1.001, 1.20]
                        weight: 1.0
                kernel: [linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021, bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs
                clean: # Different kernels for clean images can produce different final image sizes, use checkSizes: true
                    kernel: [mitchell, lanczos2, lanczos3, mks2013, mks2021] # Avoid moire effect in clean image

            -   type: jpeg
                prob: 0.3
                quality: [50, 100]

            -   type: webp
                # skipIf: [null, jpeg]
                prob: 0.1
                quality: [50, 100]

            -   type: avif
                prob: 0.1
                quality: [30, 100]

            -   type: jxl
                prob: 0.1
                quality: [30, 100]

            # Double degradation
            -   type: jpeg
                prob: 0.1
                quality: [50, 100]

            -   file: 'options/common/blur.yml'

            -   type: resize
                prob: 0.05
                both: true
                scale: [0.9, 1.1]
                kernel: [linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021, bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs
                clean: # Different kernels for clean images can produce different final image sizes, use checkSizes: true
                    kernel: [mitchell, lanczos2, lanczos3, mks2013, mks2021] # Avoid moire effect in clean image

        checkSizes: true # Check that clean and degraded images have the same size (clean == degraded * multiplier)

    -   name: opencomic-ai-descreen-hard-moire # Force moire effect
        output:
            clean: datasets/opencomic-ai-descreen-hard-moire/clean
            degraded: datasets/opencomic-ai-descreen-hard-moire/degraded
            options:  datasets/opencomic-ai-descreen-hard-moire/options
        inKrita:

            -   type: halftone
                prob: 1.0
                singleRun: false # Apply halftone only once for all degradations, reduce Krita processing time
                sameInAllLayers: true # Use the same halftone settings for all layers (all, up, middle, down), required if inKrita.halftone.config.size is used
                file: options/common/halftone-hard.yml

        inNodePromiseAll: false # Run all inNode steps in parallel (faster but currently not compatible with "if" conditions if singleRun is disabled)
        inNode:

            -   type: rotate # rotation are applied in clean and degraded images
                prob: 0.3
                angle: [-2.99, 2.99]
                background: '#ffffff'

            -   type: rotate # rotation are applied in clean and degraded images
                prob: 0.05
                skipIf: [null, rotate]
                angle: [-45, 45]
                background: '#ffffff'

            -   type: resize
                prob: 1
                both: true
                scale:  # Force moire effect

                    -   value: [0.27, 0.31]
                        if: inKrita.halftone.config.size >= 9.2

                    -   value: [[0.65, 0.70], [0.47, 0.54], [0.29, 0.39]]
                        if: inKrita.halftone.config.size >= 7.8

                    -   value: [[0.74, 0.84], [0.55, 0.64], [0.27, 0.34]]
                        if: inKrita.halftone.config.size >= 6.4

                    -   value: [[0.68, 0.80], [0.44, 0.58], [0.22, 0.30]]
                        if: inKrita.halftone.config.size >= 5.0

                    -   value: [[0.90, 1.08], [0.58, 0.74], [0.46, 0.54],  [0.30, 0.38]]
                        if: inKrita.halftone.config.size >= 3.6

                    -   value: [[0.90, 1.08], [0.71, 0.79], [0.42, 0.58],  [0.22, 0.30]]
                        if: inKrita.halftone.config.size >= 2.2

                    -   value: [1, [0.4, 1.08]]
                        if: default

                kernel: [bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs
                clean: # Different kernels for clean images can produce different final image sizes, use checkSizes: true
                    kernel: [mitchell, lanczos2, lanczos3, mks2013, mks2021] # Avoid moire effect in clean image

            -   type: jpeg
                prob: 0.3
                quality: [50, 100]

            -   type: webp
                # skipIf: [null, jpeg]
                prob: 0.1
                quality: [50, 100]

            -   type: avif
                prob: 0.1
                quality: [30, 100]

            -   type: jxl
                prob: 0.1
                quality: [30, 100]

            # Double degradation
            -   type: jpeg
                prob: 0.1
                quality: [50, 100]

            -   file: 'options/common/blur.yml'

            -   type: resize
                prob: 0.05
                both: true
                scale: [0.9, 1.1]
                kernel: [linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021, bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs
                clean: # Different kernels for clean images can produce different final image sizes, use checkSizes: true
                    kernel: [mitchell, lanczos2, lanczos3, mks2013, mks2021] # Avoid moire effect in clean image

        checkSizes: true # Check that clean and degraded images have the same size (clean == degraded * multiplier)