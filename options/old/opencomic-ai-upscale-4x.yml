seed: 0 # for reproducibility, Keep in mind that the patterns of the Krita brushes may change over different sessions.
resume: true
images: 10000 # number of clean images to generate, the total number of final images will be images * degradedImagesPerCleanImage
degradedImagesPerCleanImage: 5
format: jpg # final format of the clean and degraded images (png or jpg)

# Base options, this will be base of the image
base:

    # TODO: Not implemented yet
    disableBrushesWithPixelatedEdges: true # Disable brushes that produce pixelated edges, useful upscaling datasets

    size:
        width: [500, 2000]
        height: [500, 2000]
        multiple: 4

    background:
        -   value:
                gray: 255
            weight: 10.0
        -   value: 
                gray: [200, 254]
            weight: 2.0
        -   value: 
                gray: 0
            weight: 1.0

    halftone:
        angle:
            -   value: 45
                weight: 5.0 
            -   value: [42.1, 47.9] # range, decimal value for decimal range
                weight: 1.0
            -   value: 0
                weight: 1.0

    lineart:
        invertBackground:
            prob: 0.5
        brush: 
            name: '' # Use group if name is empty (Random brush from group)
            category: [pencil, ink, charcoal, sketching]
            size: [3, 20]
        cubicPercentage: [0.6, 1.0]
        sublines: # TODO: Not implemented yet
            active:
                prob: 0.4
            min: [1, 3]
            max: [4, 6]
            offset: [1, 10] # Max offset distance between sublines (size of the brush will be added), Randomized

    lineart-texture:
        invertBackground:
            prob: 0.5
        cubicPercentage: [0.6, 1.0]
        sublines: # TODO: Not implemented yet
            active:
                prob: 0.4

    # TODO: Not implemented yet
    shading:
        type: 
            -   value: hard
                weight: 1.0
            -   value: smoth
                weight: 1.0
            -   value: mix
                weight: 1.0
        hard:
            lineart:
                prob: 0.3
        smoth:
            size: [5, 50]
        mix:
            distribution: [0.3, 0.7] # Range of proportion of hard and smoth shading, the value below means hard and the value above means smoth (Example if distribution is 0.4, then 40% hard and 60% smoth)

    # This is also used in black-white (gray) images
    colors:
        gray:
            -   value: 
                    min: 150
                    max: 255
                weight: 3.0
            -   value: 
                    min: 0
                    max: 255
                weight: 1.0
        alpha:
            -   value: 
                    min: 255
                    max: 255
                weight: 5.0
            -   value: 
                    min: 100
                    max: 255
                weight: 1.0
        colorTone: # Only if colored is not active
            active:
                prob: 0.2
            offset:
                r: [-20, 20]
                g: [-20, 20]
                b: [-20, 20]
        colored:
            active:
                prob: 0.2
            colors: [3, 20]
            similarColors:  # Agrupate colors in a range of similar colors, 0 disables similar colors
                -   value: [0, 3]
                    weight: 1.0
                -   value: [5, 9]
                    weight: 1.0
            differentColors: # Use direfent colors inside same paint (By default similar colors are used inside same paint)
                prob: 0.5
            palette:
                name: ['rand', 'Animation Color Set', 'Concept-cookie', 'Default', 'Swatches', 'PixelArt 32', 'Gradient', 'Markers']

drawings:
    -   weight: 1.0
        value:
            type: 3layered
            list:

                -   type: lineart
                    file: options/drawings/opencomic-ai-lineart.yml
                    amount: [5, 20] # number of drawings to composite, per layer (up, middle, down)
                    points: # number of points to place the drawing (the drawing will be randomly moved and rotated around the point)
                        min: [4, 8]
                        max: [8, 15]

                -   type: colorize-mask # This is also used in black-white images to ad some gray areas
                    amount: [5, 20]

                -   type: paint
                    brush:
                        name: '' # Use group if name is empty (Random brush from group)
                        category: [airbrush, basic, bristles, dry, chalk, charcoal, wet, watercolor, rgba, shapes, texture, stamp]
                        amount: [1, 3]
                        size: 
                            min: [20, 50]
                            max: [50, 150]
                    points:
                        min: [40, 80]
                        max: [80, 150]

                -   type: lineart-texture
                    brush:
                        name: '' # Use group if name is empty (Random brush from group)
                        category: [texture, stamp]
                        amount: [0, 0, 1]
                        size: 
                            min: [50, 150]
                            max: [150, 500]
                    points: # number of points to place the drawing (the drawing will be randomly moved and rotated around the point)
                        min: [4, 8]
                        max: [8, 15]

                -   type: texture
                    prob: 0.0 # Disable, has some problems with paint layer
                    # skipIf: [null, texture]
                    blendingMode: [soft_light, gamma_light, hard_light] # https://github.com/KDE/krita/blob/ccbb2fcf3165bdac384a8264a135e030daa120c5/libs/pigment/KoCompositeOpRegistry.h
                    pattern: [01_canvas.png, 02_rough-canvas.png, 02b_WoofTissue.png, 03_default-paper.png, 04_paper-C-grain.png, 05_paper-torchon.png, 06_hard-grain.png, 08_bump-relief.png, 09_drawed_crosshatched.png, 09b_drawed-CrossedLines.png, 10_drawed_dotted.png, 11_drawed_furry.png, 12_drawed_vertical.png, 13_drawed_swirl.png, 14_texture-rock.png, 15_texture-rockB.png, 16_texture-woody.png, 17_texture-melt.png, 18_texture-bark.png, 18b_WaveFlex.png, 19_texture-crackle.png, 20_texture-vegetal.png, 21_texture-chainmail.png, 22_texture-reptile.png, 4-paper-soft-grain_testdark-black15.png, Canvas 04]

    -   weight: 1.0
        value:
            type: singlelayered
            list:

                -   type: lineart-texture
                    brush:
                        name: '' # Use group if name is empty (Random brush from group)
                        category: [texture, stamp]
                        amount: [1, 3]
                        size: 
                            min: [50, 150]
                            max: [150, 500]
                    points: # number of points to place the drawing (the drawing will be randomly moved and rotated around the point)
                        min: [4, 8]
                        max: [8, 15]

                -   type: colorize-mask # This is also used in black-white images to ad some gray areas
                    amount: [1, 3]

                -   type: paint
                    brush:
                        name: '' # Use group if name is empty (Random brush from group)
                        category: [rgba, texture, stamp]
                        amount: [1, 3]
                        size: 
                            min: [50, 150]
                            max: [150, 500]
                    points:
                        min: [40, 80]
                        max: [80, 150]

                -   type: texture
                    prob: 0.0  # Disable, has some problems with paint layer
                    # skipIf: [null, texture]
                    blendingMode: [soft_light, gamma_light, hard_light] # https://github.com/KDE/krita/blob/ccbb2fcf3165bdac384a8264a135e030daa120c5/libs/pigment/KoCompositeOpRegistry.h
                    pattern: [01_canvas.png, 02_rough-canvas.png, 02b_WoofTissue.png, 03_default-paper.png, 04_paper-C-grain.png, 05_paper-torchon.png, 06_hard-grain.png, 08_bump-relief.png, 09_drawed_crosshatched.png, 09b_drawed-CrossedLines.png, 10_drawed_dotted.png, 11_drawed_furry.png, 12_drawed_vertical.png, 13_drawed_swirl.png, 14_texture-rock.png, 15_texture-rockB.png, 16_texture-woody.png, 17_texture-melt.png, 18_texture-bark.png, 18b_WaveFlex.png, 19_texture-crackle.png, 20_texture-vegetal.png, 21_texture-chainmail.png, 22_texture-reptile.png, 4-paper-soft-grain_testdark-black15.png, Canvas 04]

    -   weight: 0.5
        value:
            type: singlelayered
            list:

                -   type: gradient
                    gradient: all
                    prob: 0.5

                -   type: texture
                    prob: 0.5
                    # skipIf: [null, texture]
                    blendingMode: [soft_light, gamma_light, hard_light] # https://github.com/KDE/krita/blob/ccbb2fcf3165bdac384a8264a135e030daa120c5/libs/pigment/KoCompositeOpRegistry.h
                    opacity: [128, 255]
                    pattern: [01_canvas.png, 02_rough-canvas.png, 02b_WoofTissue.png, 03_default-paper.png, 04_paper-C-grain.png, 05_paper-torchon.png, 06_hard-grain.png, 08_bump-relief.png, 09_drawed_crosshatched.png, 09b_drawed-CrossedLines.png, 10_drawed_dotted.png, 11_drawed_furry.png, 12_drawed_vertical.png, 13_drawed_swirl.png, 14_texture-rock.png, 15_texture-rockB.png, 16_texture-woody.png, 17_texture-melt.png, 18_texture-bark.png, 18b_WaveFlex.png, 19_texture-crackle.png, 20_texture-vegetal.png, 21_texture-chainmail.png, 22_texture-reptile.png, 4-paper-soft-grain_testdark-black15.png, Canvas 04]

                -   type: texture # Apply texture if gradient or texture was not applied before
                    prob: 1
                    skipIf: [null, gradient, texture]
                    blendingMode: [soft_light, gamma_light, hard_light] # https://github.com/KDE/krita/blob/ccbb2fcf3165bdac384a8264a135e030daa120c5/libs/pigment/KoCompositeOpRegistry.h
                    opacity: [128, 255]
                    pattern: [01_canvas.png, 02_rough-canvas.png, 02b_WoofTissue.png, 03_default-paper.png, 04_paper-C-grain.png, 05_paper-torchon.png, 06_hard-grain.png, 08_bump-relief.png, 09_drawed_crosshatched.png, 09b_drawed-CrossedLines.png, 10_drawed_dotted.png, 11_drawed_furry.png, 12_drawed_vertical.png, 13_drawed_swirl.png, 14_texture-rock.png, 15_texture-rockB.png, 16_texture-woody.png, 17_texture-melt.png, 18_texture-bark.png, 18b_WaveFlex.png, 19_texture-crackle.png, 20_texture-vegetal.png, 21_texture-chainmail.png, 22_texture-reptile.png, 4-paper-soft-grain_testdark-black15.png, Canvas 04]

postProcessing:

    -   type: texture-image # TODO: Not implemented yet, ignore?
        prob: 0.1
        # file: 'options/textures/opencomic-ai-texture-image.yml'
        pattern:
            name: '' # Use group if name is empty
            category: [test, text]

    -   type: layer-blur # TODO: Not implemented yet, ignore?
        prob: 0.1
        blurUp: [50, 100]
        blurDown: [10, 50]

finalProcessing:

    -   type: noise # TODO: Not implemented yet
        prob: 0.1
        size: [0.5, 5.0]
        gray: [5.1, 29.9]

degradations:

    -   name: opencomic-ai-upscale-4x
        output:
            clean: datasets/opencomic-ai-upscale-4x/clean
            degraded: datasets/opencomic-ai-upscale-4x/degraded
            options:  datasets/opencomic-ai-upscale-4x/options
        inKrita:

            -   type: halftone
                prob: 1.0
                # singleRun: true # Apply halftone only once for all degradations, reduce Krita processing time
                sameInAllLayers: true # Use the same halftone settings for all layers (all, up, middle, down)
                applyIn:
                    -   value: without
                        weight: 20.0
                    -   value: both
                        weight: 1.0

                both:
                    pattern: dots # dots and lines
                    size: [6, 16]
                    mode: 
                        -   value: both # intensity and alpha
                            weight: 5.0 
                        -   value: intensity
                            weight: 1.0
                        -   value: alpha
                            weight: 1.0
                        -   value: independent_channels
                            weight: 0.5
                    shapes:
                        -   value: dot
                            weight: 10.0 
                        -   value: [elipse, diamond, square]
                            weight: 5.0
                    interpolation:
                        -   value: lineal
                            weight: 5.0 
                        -   value: sinusoidal
                            weight: 2.0

                colored: # colored and colorTone, copy from parent the options missing here, TODO: Checi if this is working
                    applyIn:
                        -   value: without
                            weight: 10.0
                        -   value: both
                            weight: 1.0

                    both:
                        pattern: dots # dots and lines
                        size: [6, 16]
                        mode: 
                            # -   value: both # intensity and alpha
                            #     weight: 5.0 
                            # -   value: intensity
                            #     weight: 1.0 
                            # -   value: alpha
                            #     weight: 1.0
                            -   value: independent_channels
                                weight: 7.0

        # inNodePromiseAll: true # Run all inNode steps in parallel (faster but currently not compatible with "if" conditions if singleRun is disabled)
        inNode:

            -   type: rotate # rotation are applied in clean and degraded images
                prob: 0.1
                angle: [-45, 45]
                background: '#ffffff'

            -   type: resize
                prob: 1
                both: false
                scale: 0.25
                kernel: [linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021, bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs

            -   type: jpeg
                prob: 0.5
                quality: [30, 100]

            -   type: webp
                # skipIf: [null, jpeg]
                prob: 0.05
                quality: [30, 100]

            -   type: jpeg
                prob: 0.05
                quality: [30, 100]

            -   type: jpeg
                prob: 0.05
                quality: [30, 100]