seed: 1 # for reproducibility, Keep in mind that the patterns of the Krita brushes may change over different sessions.
resume: true
images: 20000 # number of clean images to generate, the total number of final images will be images * degradedImagesPerCleanImage
degradedImagesPerCleanImage: 5
format: jpg # final format of the clean and degraded images (png or jpg)

# Base options, this will be base of the image
base:
    scale: 1 # This scaled all size values, for example if the width is 500-2000 it would be 1000-4000
    disableBrushesWithPixelatedEdges: true # Disable brushes that produce pixelated edges, useful upscaling datasets or avoid pixelated restoration
    file: options/common/base.yml
    size:
        # width: [500, 2000] # [1000, 4000]
        # height: [500, 2000] # [1000, 4000]
        size: [250, 1000] # Force square image
        # width: [250, 1000] # [1000, 4000]
        # height: [250, 1000] # [1000, 4000]
        multiple: 2

drawings:
    file: 'options/common/drawings.yml'

degradations:

    -   name: opencomic-ai-upscale-2x
        output:
            clean: datasets/opencomic-ai-upscale-2x/clean
            degraded: datasets/opencomic-ai-upscale-2x/degraded
        inKrita:

            -   type: halftone
                prob: 1.0
                singleRun: false # Apply halftone only once for all degradations, reduce Krita processing time
                sameInAllLayers: true # Use the same halftone settings for all layers (all, up, middle, down)
                file: options/common/halftone-upscale.yml

        # inNodePromiseAll: true # Run all inNode steps in parallel (faster but currently not compatible with "if" conditions if singleRun is disabled)
        inNode:

            -   type: rotate # rotation are applied in clean and degraded images
                prob: 0.2
                angle: [-45, 45]
                background: '#ffffff'

            -   type: resize
                prob: 1
                both: false
                scale: 0.5
                kernel: [linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021, bicubic, bilinear, nohalo, lbb, vsqbs] # kernels: nearest, linear, cubic, mitchell, lanczos2, lanczos3, mks2013, mks2021 | and also affine: bicubic, bilinear, nohalo, lbb, vsqbs

            -   type: jpeg
                prob: 0.5
                quality: [30, 100]

            -   type: webp
                # skipIf: [null, jpeg]
                prob: 0.05
                quality: [30, 100]

            -   type: jpeg
                prob: 0.05
                quality: [30, 100]

            -   type: jpeg
                prob: 0.05
                quality: [30, 100]

            -   file: 'options/common/blur.yml'